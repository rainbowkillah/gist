name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repository contents
        run: |
          pwd
          ls -la

      - name: Basic shell check
        run: |
          if [ -d scripts ]; then
            find scripts -type f -name "*.sh" -print0 | xargs -0 -r bash -n
          fi
